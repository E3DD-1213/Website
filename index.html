<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="style.css" rel="stylesheet">
</head>
<body>

<header class="site-header">
    <div class="container-fluid px-4 d-flex flex-wrap align-items-center justify-content-between">
        
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-decoration-none">
            <span class="fs-2 fw-bold text-white">Eric Browning</span>
        </a>
        
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
            Menu
        </button>
        
        <nav class="site-nav" id="site-nav">
            <ul class="nav nav-pills align-items-center">
            <li class="nav-item"><a href="#eventProduction" class="nav-link">Event Production</a></li>
            <li class="nav-item"><a href="#resume" class="nav-link">Resume</a></li>
            <li class="nav-item"><a href="#about" class="nav-link">About</a></li>
            <li class="nav-item"><a class="btn btn-sm btn-primary nav-cta" href="#contact-me">Contact Me</a></li>
            </ul>
        </nav>

    </div>
</header>


<!-- JS for Mobile Nav Toggle -->
<script>
    (() => {
    const toggle = document.querySelector('.nav-toggle');
    const nav = document.querySelector('.site-nav');
    if (!toggle || !nav) return;

    toggle.addEventListener('click', () => {
        const isOpen = nav.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', String(isOpen));
    });
    })();
</script>

<!-- JS for Glow Chase -->
    <script>
    (() => {
        const root = document.documentElement;
        let targetX = 0.5;
        let targetY = 0.5;
        let currentX = 0.5;
        let currentY = 0.5;
        
        // Lerp smoothing
        const lerp = (a, b, t) => a + (b - a) * t;

        function update() {
        let trackSpeed = 0.05

        currentX = lerp(currentX, targetX, trackSpeed);
        currentY = lerp(currentY, targetY, trackSpeed);
        
        // Push calculated coordinates to the CSS variables
        root.style.setProperty('--cursor-x', `${(currentX * 100).toFixed(2)}%`);
        root.style.setProperty('--cursor-y', `${(currentY * 100).toFixed(2)}%`);
        
        requestAnimationFrame(update);
        }

        // Update target coordinates whenever the mouse moves
        window.addEventListener('mousemove', (event) => {
        targetX = event.clientX / window.innerWidth;
        targetY = event.clientY / window.innerHeight;
        });

        // Update loop
        update();
    })();
    </script>

</body>
</html>
